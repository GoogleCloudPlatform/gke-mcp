name: GKE-MCP Daily DevOps Bench Evaluation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER_NAME: "demo-cluster-2"
  AGENT_MODEL: "gemini-2.5-pro"
  JUDGE_MODEL: "gemini-2.5-pro"

permissions: read-all

on:
  schedule:
    - cron: '0 2 * * *' # Daily at 2:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  evaluate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout GKE-MCP
        uses: actions/checkout@v6
        with:
          path: gke-mcp

      - name: Checkout DevOps Bench
        uses: actions/checkout@v6
        with:
          repository: gke-labs/devops-bench
          path: devops-bench
          # If it is a private repo, a PAT token might be needed, but since it is gke-labs/devops-bench it might be public or accessible. 
          # Assuming standard Gactions can check out if user has repository tokens configured.

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Gcloud ADC Fallback
        run: |
          mkdir -p ~/.config/gcloud
          cp "${{ env.GOOGLE_APPLICATION_CREDENTIALS }}" ~/.config/gcloud/application_default_credentials.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "gke-mcp/go.mod"

      - name: Set up Node.js (For UI build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build GKE-MCP UI
        run: |
          cd gke-mcp
          npm --prefix ui install
          npm --prefix ui run build

      - name: Build GKE-MCP Server
        run: |
          cd gke-mcp
          go build -o gke-mcp .

      - name: Install Python Dependencies (DevOps Bench)
        run: |
          python -m venv venv
          ./venv/bin/pip install --index-url https://pypi.org/simple -r devops-bench/requirements.txt

      # RUN 1: Baseline Gemini Model (BENCH_USE_MCP = false)
      - name: Run Baseline Evaluation
        working-directory: devops-bench
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BENCH_AGENT_TYPE: "api"
          BENCH_USE_MCP: "false"
          MCP_SERVER_PATH: "${{ github.workspace }}/gke-mcp/gke-mcp"
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GKE_CLUSTER_NAME: ${{ env.GKE_CLUSTER_NAME }}
          AGENT_MODEL: ${{ env.AGENT_MODEL }}
          JUDGE_MODEL: ${{ env.JUDGE_MODEL }}
          # Confident AI (Only runs if key exists)
          CONFIDENT_API_KEY: ${{ secrets.CONFIDENT_API_KEY }}
          CONFIDENT_PROJECT_NAME: "GKE-MCP-Daily-Baseline"
        run: |
          ../venv/bin/python3 pkg/evaluator/evaluate.py tasks
          # Move results to base folder and clean up
          RUN_DIR=$(find results/ -maxdepth 1 -name "run_*" -type d | head -n 1)
          mkdir -p results/base
          mv $RUN_DIR/results.json results/base/results.json
          rm -rf $RUN_DIR

      # RUN 2: Enhanced GKE-MCP Agent (BENCH_USE_MCP = true)
      - name: Run GKE-MCP Enhanced Evaluation
        working-directory: devops-bench
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BENCH_AGENT_TYPE: "api"
          BENCH_USE_MCP: "true"
          MCP_SERVER_PATH: "${{ github.workspace }}/gke-mcp/gke-mcp"
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GKE_CLUSTER_NAME: ${{ env.GKE_CLUSTER_NAME }}
          AGENT_MODEL: ${{ env.AGENT_MODEL }}
          JUDGE_MODEL: ${{ env.JUDGE_MODEL }}
          # Confident AI (Only runs if key exists)
          CONFIDENT_API_KEY: ${{ secrets.CONFIDENT_API_KEY }}
          CONFIDENT_PROJECT_NAME: "GKE-MCP-Daily-Enhanced"
        run: |
          ../venv/bin/python3 pkg/evaluator/evaluate.py tasks
          # Move results to enhanced folder and clean up
          RUN_DIR=$(find results/ -maxdepth 1 -name "run_*" -type d | head -n 1)
          mkdir -p results/enhanced
          mv $RUN_DIR/results.json results/enhanced/results.json
          rm -rf $RUN_DIR

      # RUN 3: Generate Summary Markdown Report
      - name: Generate Dashboard Summary
        if: always()
        run: |
          python3 gke-mcp/pkg/agents/evals/generate_summary.py devops-bench/results/base/results.json devops-bench/results/enhanced/results.json
